<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOLOTOV - Toko Material Bangunan Online</title>
    <meta name="description" content="Sistem manajemen toko material bangunan online dengan fitur cargo dan logistik tracking. Kelola inventaris, pesanan, dan pengiriman dengan mudah.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===== TOAST NOTIFICATION ===== -->
    <div id="toast-container"></div>

    <!-- ===== LOGIN / REGISTER SCREEN ===== -->
    <div id="auth-screen" class="screen active">
        <div class="auth-bg">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
            <div class="floating-shape shape-4"></div>
        </div>
        <div class="auth-container">
            <div class="auth-card glass-card">
                <div class="auth-logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 48 48" fill="none">
                            <rect x="4" y="20" width="40" height="24" rx="3" fill="url(#grad1)" opacity="0.9"/>
                            <path d="M24 4L4 20H44L24 4Z" fill="url(#grad2)"/>
                            <rect x="18" y="28" width="12" height="16" rx="2" fill="rgba(255,255,255,0.3)"/>
                            <rect x="20" y="30" width="8" height="6" rx="1" fill="rgba(255,255,255,0.5)"/>
                            <defs>
                                <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" stop-color="#f97316"/>
                                    <stop offset="100%" stop-color="#ea580c"/>
                                </linearGradient>
                                <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" stop-color="#fb923c"/>
                                    <stop offset="100%" stop-color="#f97316"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1 class="logo-text">MOLOTOV</h1>
                    <p class="logo-subtitle">Toko Material Bangunan Online</p>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <h2 class="form-title">Masuk ke Akun</h2>
                    <div class="input-group">
                        <label for="login-username">Username</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                            <input type="text" id="login-username" placeholder="Masukkan username" autocomplete="username" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                            <input type="password" id="login-password" placeholder="Masukkan password" autocomplete="current-password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)" aria-label="Toggle password visibility">
                                <svg class="eye-open" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
                                <svg class="eye-closed hidden" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                        <span>Masuk</span>
                        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                    </button>
                    <p class="auth-switch">Belum punya akun? <a href="#" onclick="switchAuth('register')">Daftar Sekarang</a></p>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <h2 class="form-title">Buat Akun Baru</h2>
                    <div class="input-group">
                        <label for="reg-nama">Nama Lengkap</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                            <input type="text" id="reg-nama" placeholder="Contoh: Ahmad Fauzi" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="reg-username">Username</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
                            <input type="text" id="reg-username" placeholder="Min 3 karakter, tanpa spasi" required>
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="reg-telepon">No Telepon</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"/></svg>
                                <input type="tel" id="reg-telepon" placeholder="9-13 digit" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="reg-alamat">Alamat</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/></svg>
                                <input type="text" id="reg-alamat" placeholder="Kota / Alamat" required>
                            </div>
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="reg-password">Password</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                                <input type="password" id="reg-password" placeholder="Min 8 karakter" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="reg-konfirmasi">Konfirmasi Password</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                                <input type="password" id="reg-konfirmasi" placeholder="Ulangi password" required>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="register-btn">
                        <span>Daftar</span>
                        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z"/></svg>
                    </button>
                    <p class="auth-switch">Sudah punya akun? <a href="#" onclick="switchAuth('login')">Masuk di sini</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- ===== MAIN APP SCREEN ===== -->
    <div id="app-screen" class="screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg viewBox="0 0 48 48" fill="none" width="32" height="32">
                        <rect x="4" y="20" width="40" height="24" rx="3" fill="url(#grad1s)" opacity="0.9"/>
                        <path d="M24 4L4 20H44L24 4Z" fill="url(#grad2s)"/>
                        <rect x="18" y="28" width="12" height="16" rx="2" fill="rgba(255,255,255,0.3)"/>
                        <defs>
                            <linearGradient id="grad1s" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#f97316"/>
                                <stop offset="100%" stop-color="#ea580c"/>
                            </linearGradient>
                            <linearGradient id="grad2s" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#fb923c"/>
                                <stop offset="100%" stop-color="#f97316"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="sidebar-brand">MOLOTOV</span>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
                </button>
            </div>

            <div class="sidebar-user">
                <div class="user-avatar" id="user-avatar">A</div>
                <div class="user-info">
                    <span class="user-name" id="user-name">Admin</span>
                    <span class="user-role" id="user-role">Administrator</span>
                </div>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Nav items will be injected by JS based on role -->
            </nav>

            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()" id="logout-btn">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
                    <span>Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <header class="top-bar">
                <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Open menu">
                    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
                </button>
                <h2 class="page-title" id="page-title">Dashboard</h2>
                <div class="top-bar-right">
                    <span class="clock" id="live-clock"></span>
                </div>
            </header>

            <div class="content-area" id="content-area">
                <!-- Dynamic content injected by JS -->
            </div>
        </main>
    </div>

    <!-- ===== MODAL ===== -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content glass-card" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button class="modal-close" onclick="closeModal()" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
